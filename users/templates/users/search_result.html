{% extends 'base.html' %}

{% block content %}
<h2>Результаты поиска</h2>

{% if users %}
    <ul>
        {% for user in users %}
        <li>{{ user.username }} - {{ user.email }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>По запросу "{{ query }}" ничего не найдено.</p>
{% endif %}

{% endblock content %}
