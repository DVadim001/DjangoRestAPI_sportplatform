{% extends 'base.html' %}


{% block content %}

<h1>{{ event.name }}</h1>
<p>Место проведения: {{ event.location }}</p>
<p>Начало: {{ event.start_time }}</p>
<p>Окончание: {{ event.end_time }}</p>
<p>Описание: {{ event.description }}</p>
<p>Организатор: {{ event.organizer }}</p>

{% endblock content %}
