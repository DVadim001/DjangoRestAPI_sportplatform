{% extends 'base.html' %}


{% block content %}

<h2>Подтвердите удаление события</h2>
<form method="post">
    {% csrf_token %}
    <p>Вы уверены, что хотите удалить "{{ event.name }}"?</p>
    <input type="submit" value="Удалить">
    <a href="{% url 'events_list' %}">Отмена</a>
</form>

{% endblock content %}
